<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity=".9"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">BIAT IT</span>
      <span class="logo-sub">CV Platform</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a
      *ngFor="let item of navItems"
      class="nav-item"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }">
      <svg class="nav-icon" width="16" height="16" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
      </svg>
      <span>{{ item.label }}</span>
      <span *ngIf="item.badge" class="nav-badge">{{ item.badge }}</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <!-- API Key Settings Button -->
    <button class="btn-settings" (click)="openSettings()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
      <span>Groq API Key</span>
      <span class="key-status-dot" [class.key-status-dot--active]="hasApiKey"></span>
    </button>

    <div class="user-block">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole | titlecase }}</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign out
    </button>
  </div>
</aside>

<!-- Settings Panel Modal -->
<div class="settings-backdrop" *ngIf="showSettings" (click)="showSettings = false">
  <div class="settings-panel" (click)="$event.stopPropagation()">
    <div class="settings-head">
      <h3 class="settings-title">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        Groq API Key
      </h3>
      <button class="btn-icon-close" (click)="showSettings = false">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p class="settings-desc">
      Your Groq API key is saved locally in your browser and used across CV upload, AI Search, and Job Matching.
      Get a free key at <a href="https://console.groq.com" target="_blank" rel="noopener">console.groq.com</a>.
    </p>
    <div class="key-row">
      <div class="key-input-wrap">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="key-icon">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
        <input
          [type]="showApiKey ? 'text' : 'password'"
          [(ngModel)]="apiKeyInput"
          class="settings-input"
          placeholder="gsk_…"
        />
      </div>
      <button class="btn-eye" (click)="showApiKey = !showApiKey">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                [attr.d]="showApiKey
                  ? 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21'
                  : 'M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'"/>
        </svg>
      </button>
    </div>
    <div class="settings-actions">
      <button class="btn-clear" (click)="clearKey()" *ngIf="hasApiKey">Clear Key</button>
      <button class="btn-save" (click)="saveSettings()" [disabled]="!apiKeyInput.trim()">Save Key</button>
    </div>
  </div>
</div>

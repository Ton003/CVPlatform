<div class="auth-shell">
  <div class="auth-glow" aria-hidden="true"></div>
  <div class="auth-grid" aria-hidden="true"></div>

  <div class="auth-card auth-card--wide">

    <div class="auth-logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity=".9"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">BIAT IT</span>
    </div>

    <div class="auth-heading">
      <h1>Create account</h1>
      <p>Join the CV Intelligence Platform</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="field-row">
        <div class="field">
          <label>First name</label>
          <div class="input-wrap">
            <input type="text" formControlName="first_name" placeholder="First name"
              [class.is-error]="first_name.invalid && first_name.touched" />
          </div>
          <span class="field-error" *ngIf="first_name.invalid && first_name.touched">Required</span>
        </div>
        <div class="field">
          <label>Last name</label>
          <div class="input-wrap">
            <input type="text" formControlName="last_name" placeholder="Last name"
              [class.is-error]="last_name.invalid && last_name.touched" />
          </div>
          <span class="field-error" *ngIf="last_name.invalid && last_name.touched">Required</span>
        </div>
      </div>

      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" formControlName="email" placeholder="you@biat-it.com.tn"
            [class.is-error]="email.invalid && email.touched" />
        </div>
        <span class="field-error" *ngIf="email.invalid && email.touched">
          <ng-container *ngIf="email.errors?.['required']">Email is required</ng-container>
          <ng-container *ngIf="email.errors?.['email']">Please enter a valid email</ng-container>
        </span>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="Minimum 8 characters"
            [class.is-error]="password.invalid && password.touched" />
          <button type="button" class="btn-eye" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && password.touched">
          <ng-container *ngIf="password.errors?.['required']">Password is required</ng-container>
          <ng-container *ngIf="password.errors?.['minlength']">Minimum 8 characters</ng-container>
        </span>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Role</label>
          <div class="select-wrap">
            <select formControlName="role">
              <option value="hr">HR Manager</option>
              <option value="manager">Manager</option>
              <option value="admin">Administrator</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
        <div class="field">
          <label>Department <span class="label-opt">(optional)</span></label>
          <div class="input-wrap">
            <input type="text" formControlName="department" placeholder="e.g. DSI, Digital" />
          </div>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading" class="btn-loading">
          <span class="spinner"></span> Creating account...
        </span>
      </button>

    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </p>

  </div>
</div>

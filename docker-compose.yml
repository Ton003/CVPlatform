services:

  # ── PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: biat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python AI microservice
  python-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: biat_python
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Increased start_period: models load from disk on first startup
      start_period: 30s

  # ── NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biat_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      PYTHON_SERVICE_URL: http://python-service:8002
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        # Changed from service_started → service_healthy
        # Ensures python service is fully up before backend connects
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  # ── Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: